; ESP32-WROOM-32 DevKitC（见 hardware/HARDWARE.md）

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DMOCK_MPU6050=1
lib_deps =
    electroniccats/MPU6050@^1.4.3

; 无传感器联调：MOCK_MPU6050=1（默认）
; 接上 MPU6050 后改为 -DMOCK_MPU6050=0 并重新编译
